name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn workspace web lint

  test_typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test:db
      - run: yarn test:web
      - run: yarn test:worker
      - run: yarn workspace worker build
      - run: yarn build:web
        env:
          AUTH_SECRET: ci-test-secret-at-least-32-chars-long!!
          NEXTAUTH_URL: http://localhost:3001

  docs_inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile
      - run: node scripts/document-skills-and-agents.mjs --check
