# Database configuration with multi-database support
#
# PostgreSQL (default): Used for production and standard development
# SQLite (Solid Stack mode): Used when SOLID_STACK=true for easy local development
#
# To use Solid Stack mode (SQLite + Solid Queue + Solid Cache):
#   SOLID_STACK=true bin/dev-local
#
# To use standard PostgreSQL + Sidekiq mode:
#   bin/dev

<% if ENV["SOLID_STACK"] == "true" %>
# ============================================
# Solid Stack Mode (SQLite)
# ============================================

default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: storage/development_cache.sqlite3
    migrations_paths: db/cache_migrate

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: storage/test_cache.sqlite3
    migrations_paths: db/cache_migrate

production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate

<% else %>
# ============================================
# PostgreSQL Mode (Standard)
# ============================================

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: customer_pulse_development

test:
  <<: *default
  database: customer_pulse_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>

<% end %>
