databases:
  - name: customer-pulse-db
    databaseName: customer_pulse_production
    user: customer_pulse
    plan: starter

services:
  # Web service
  - type: web
    name: customer-pulse
    runtime: ruby
    plan: starter
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: customer-pulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: customer-pulse-redis
          type: redis
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: LOCKBOX_MASTER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false

  # Background worker
  - type: worker
    name: customer-pulse-worker
    runtime: ruby
    plan: starter
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: customer-pulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: customer-pulse-redis
          type: redis
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        sync: false
      - key: LOCKBOX_MASTER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # Redis
  - type: redis
    name: customer-pulse-redis
    plan: starter
    maxmemoryPolicy: noeviction
