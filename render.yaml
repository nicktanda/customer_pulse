# Render Blueprint — Next.js (apps/web) + BullMQ worker (apps/worker), Yarn monorepo root.
# After first deploy, set NEXTAUTH_URL to your public web URL (e.g. https://customer-pulse.onrender.com).

databases:
  - name: customer-pulse-db
    databaseName: customer_pulse_production
    user: customer_pulse
    plan: starter

services:
  - type: web
    name: customer-pulse
    runtime: node
    plan: starter
    buildCommand: ./bin/render-build.sh
    startCommand: yarn workspace web start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: customer-pulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: customer-pulse-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      # Must match the public URL of this web service (Auth.js / OAuth callbacks).
      - key: NEXTAUTH_URL
        sync: false
      - key: LOCKBOX_MASTER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: APP_HOST
        sync: false

  - type: worker
    name: customer-pulse-worker
    runtime: node
    plan: starter
    buildCommand: yarn install --frozen-lockfile && yarn workspace worker build
    startCommand: yarn workspace worker start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: customer-pulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: customer-pulse-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: LOCKBOX_MASTER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      # Optional: Bull Board admin UI (do not expose publicly without auth).
      - key: BULL_BOARD_PORT
        value: "3002"
      - key: BULL_BOARD_USER
        sync: false
      - key: BULL_BOARD_PASS
        sync: false

  - type: redis
    name: customer-pulse-redis
    plan: starter
    maxmemoryPolicy: noeviction
